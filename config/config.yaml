model:
  name: "distilbert-base-uncased-finetuned-sst-2-english"
  max_length: 512

data:
  train_path: "datasets/stanford/data_train/cleaned_data"
  test_path: "datasets/stanford/data_test/cleaned_data"
  batch_size: 16

training:
  epochs: 3
  learning_rate: 2e-5
  output_dir: "results"

preprocessing:
  pos_label: "positive"
  neg_label: "negative"